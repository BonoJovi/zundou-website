<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .lang-selector {
            position: absolute;
            inset-block-start: 16px;
            inset-inline-end: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            justify-content: flex-end;
        }
        .lang-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #333;
        }
        .lang-btn:hover {
            background: white;
            transform: scale(1.05);
        }
        .lang-btn.active {
            border-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 48px;
            color: white;
        }
        .header h1 {
            font-size: 48px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header p {
            font-size: 18px;
            opacity: 0.95;
            font-weight: 300;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            margin-bottom: 32px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }
        .product-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .product-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }
        .product-desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
            flex-grow: 1;
            font-size: 15px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            padding-top: 24px;
            margin-top: auto;
        }
        .notice-banner {
            background: #fff8e1;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 32px;
            width: 100%;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
        }
        .notice-banner-icon {
            font-size: 22px;
            flex-shrink: 0;
            line-height: 1.4;
        }
        .notice-banner-text {
            color: #92400e;
            font-size: 15px;
            line-height: 1.7;
        }
        @media (max-width: 768px) {
            .lang-selector {
                position: static;
                width: 100%;
                margin-bottom: 24px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .header {
                margin-bottom: 32px;
            }
            .header h1 {
                font-size: 32px;
            }
            .header p {
                font-size: 16px;
            }
            .products-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .product-card {
                padding: 24px 16px;
            }
        }
    </style>

        // Language codes in order
        const LANGUAGES = ['en', 'ja', 'fr', 'it', 'de', 'ru', 'ar'];

        // Detect user language
        function detectLanguage() {
            const browserLang = navigator.language.split('-')[0];
            if (TRANSLATIONS[browserLang]) {
                return browserLang;
            }
            return 'en'; // Default to English
        }

        // Set current language
        let currentLang = detectLanguage();

        // Check for stored preference
        const storedLang = localStorage.getItem('zundouLang');
        if (storedLang && TRANSLATIONS[storedLang]) {
            currentLang = storedLang;
        }

        // Update page language
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('zundouLang', lang);
            document.documentElement.lang = lang;
            if (lang === 'ar') {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }

            // Update all elements with data-i18n
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                const translation = TRANSLATIONS[currentLang][key];
                if (translation) {
                    if (element.tagName === 'TITLE') {
                        element.textContent = translation;
                    } else if (element.getAttribute('data-i18n') === 'description') {
                        element.setAttribute('content', translation);
                    } else {
                        element.textContent = translation;
                    }
                }
            });

            // Update language selector buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });
        }

        // Create language selector
        function initLanguageSelector() {
            const selector = document.getElementById('langSelector');
            LANGUAGES.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'lang-btn';
                btn.dataset.lang = lang;
                btn.textContent = lang.toUpperCase();
                btn.onclick = () => setLanguage(lang);
                selector.appendChild(btn);
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initLanguageSelector();
            setLanguage(currentLang);
        });
